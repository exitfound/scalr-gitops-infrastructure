apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scalr-agent-token
  namespace: scalr-agent-test
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: gcp-sm
    kind: ClusterSecretStore
  target:
    name: scalr-agent-token
  data:
    - secretKey: token
      remoteRef:
        key: scalr-agent-pool-token-test
