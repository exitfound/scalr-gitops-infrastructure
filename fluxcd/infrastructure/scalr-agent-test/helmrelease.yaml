apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scalr-agent
  namespace: scalr-agent-test
spec:
  interval: 15m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  chart:
    spec:
      chart: agent-local
      version: "0.5.71"
      sourceRef:
        kind: HelmRepository
        name: scalr-agent-helm
        namespace: scalr-agent-test
  valuesFrom:
    - kind: Secret
      name: scalr-agent-token
      valuesKey: token
      targetPath: agent.token
  values:
    replicaCount: 1

    agent:
      url: https://kitezh.scalr.io
      shutdownMode: graceful
      dataDir: "/var/lib/scalr-agent/data"
      cacheDir: "/var/lib/scalr-agent/cache"

    serviceAccount:
      create: false
      name: scalr-agent-test
      automountToken: true

    allowMetadataService: true

    podSecurityContext:
      runAsNonRoot: true
      fsGroup: 1000

    securityContext:
      privileged: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000

    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "1024Mi"

    persistence:
      enabled: false
      data:
        emptyDir:
          sizeLimit: 4Gi
      cache:
        emptyDir:
          sizeLimit: 10Gi

    terminationGracePeriodSeconds: 120
